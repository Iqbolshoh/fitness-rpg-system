<!DOCTYPE html>
<html>
<head>
  <title>Training - Fitness RPG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <div class="logo">🏋️ Fitness RPG</div>
  <div>
    <a href="index.html">Home</a>
    <a class="active" href="training.html">Training</a>
    <a href="profile.html">Profile</a>
  </div>
</div>

<div class="container">

  <div class="card">
    <h2>⚡ Training Dashboard</h2>
    <p>Complete missions and earn XP to level up your character.</p>
  </div>

  <div class="card">
    <h3>🎮 Active Missions</h3>

    <button onclick="addXP(10)">🏃 Morning Run (+10 XP)</button>
    <button onclick="addXP(15)">🚶 Walking Session (+15 XP)</button>
    <button onclick="addXP(20)">💪 Gym Workout (+20 XP)</button>
    <button onclick="addXP(30)">🏋️ Strength Training (+30 XP)</button>
    <button onclick="addXP(50)">🔥 Hardcore Challenge (+50 XP)</button>

  </div>

  <div class="card">
    <h3>📊 Progress Status</h3>

    <p>Level: <span id="level">1</span></p>
    <p>XP: <span id="xp">0</span> / 100</p>

    <div class="progress">
      <div id="bar"></div>
    </div>

    <p style="opacity:0.6;font-size:13px;">
      Tip: Consistency is the key. Train daily to level up faster.
    </p>
  </div>

</div>

<footer>⚡ Keep grinding. No excuses.</footer>

<script src="script.js"></script>
</body>
</html>
